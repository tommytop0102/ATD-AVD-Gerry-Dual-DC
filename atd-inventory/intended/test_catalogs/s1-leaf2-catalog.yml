anta.tests.hardware:
- VerifyEnvironmentPower:
    result_overwrite:
      custom_field: 'Accepted States: ''ok'''
    states:
    - ok
- VerifyEnvironmentCooling:
    result_overwrite:
      custom_field: 'Accepted States: ''ok'''
    states:
    - ok
- VerifyTemperature: null
- VerifyTransceiversManufacturers:
    manufacturers:
    - Arista Networks
    - Arastra, Inc.
    - Not Present
    result_overwrite:
      custom_field: 'Accepted Manufacturers: ''Arista Networks'', ''Arastra, Inc.'',
        ''Not Present'''
anta.tests.interfaces:
- VerifyInterfacesStatus:
    interfaces:
    - name: Ethernet1
      status: up
    result_overwrite:
      custom_field: Interface Ethernet1 - MLAG_PEER_s1-leaf1_Ethernet1 = 'up'
- VerifyInterfacesStatus:
    interfaces:
    - name: Ethernet6
      status: up
    result_overwrite:
      custom_field: Interface Ethernet6 - MLAG_PEER_s1-leaf1_Ethernet6 = 'up'
- VerifyInterfacesStatus:
    interfaces:
    - name: Ethernet2
      status: up
    result_overwrite:
      custom_field: Interface Ethernet2 - P2P_LINK_TO_S1-SPINE1_Ethernet3 = 'up'
- VerifyInterfacesStatus:
    interfaces:
    - name: Ethernet3
      status: up
    result_overwrite:
      custom_field: Interface Ethernet3 - P2P_LINK_TO_S1-SPINE2_Ethernet3 = 'up'
- VerifyInterfacesStatus:
    interfaces:
    - name: Ethernet4
      status: up
    result_overwrite:
      custom_field: Interface Ethernet4 - Routed_Interface_4 int_routed_host = 'up'
- VerifyInterfacesStatus:
    interfaces:
    - name: Port-Channel1
      status: up
    result_overwrite:
      custom_field: Interface Port-Channel1 - MLAG_PEER_s1-leaf1_Po1 = 'up'
- VerifyInterfacesStatus:
    interfaces:
    - name: Vlan4093
      status: up
    result_overwrite:
      custom_field: Interface Vlan4093 - MLAG_PEER_L3_PEERING = 'up'
- VerifyInterfacesStatus:
    interfaces:
    - name: Vlan4094
      status: up
    result_overwrite:
      custom_field: Interface Vlan4094 - MLAG_PEER = 'up'
- VerifyInterfacesStatus:
    interfaces:
    - name: Vlan110
      status: up
    result_overwrite:
      custom_field: Interface Vlan110 - bluevrf_OP_Zone_1 = 'up'
- VerifyInterfacesStatus:
    interfaces:
    - name: Vlan3009
      status: up
    result_overwrite:
      custom_field: 'Interface Vlan3009 - MLAG_PEER_L3_iBGP: vrf bluevrf = ''up'''
- VerifyInterfacesStatus:
    interfaces:
    - name: Loopback0
      status: up
    result_overwrite:
      custom_field: Interface Loopback0 - EVPN_Overlay_Peering = 'up'
- VerifyInterfacesStatus:
    interfaces:
