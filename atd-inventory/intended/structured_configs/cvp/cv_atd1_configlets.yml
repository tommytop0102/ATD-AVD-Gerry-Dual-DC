cvp_configlets:
  AVD_s1-brdr1: "!RANCID-CONTENT-TYPE: arista\n!\nvlan internal order ascending range
    1006 1199\n!\ntransceiver qsfp default-mode 4x10G\n!\nservice routing protocols
    model multi-agent\n!\nhostname s1-brdr1\nip name-server vrf default 8.8.8.8\nip
    name-server vrf default 168.95.1.1\nip name-server vrf default 192.168.2.1\ndns
    domain atd.lab\n!\nntp server 10.70.32.147 prefer iburst\nntp server time.google.com
    prefer iburst\n!\nspanning-tree mode mstp\nno spanning-tree vlan-id 4093-4094\nspanning-tree
    mst 0 priority 16384\n!\nno enable password\nno aaa root\n!\nvlan 110\n   name
    bluevrf_OP_Zone_1\n!\nvlan 160\n   name bluevrf_VMOTION\n!\nvlan 360\n   name
    bluevrf_V360\n!\nvlan 3009\n   name MLAG_iBGP_bluevrf\n   trunk group LEAF_PEER_L3\n!\nvlan
    4093\n   name LEAF_PEER_L3\n   trunk group LEAF_PEER_L3\n!\nvlan 4094\n   name
    MLAG_PEER\n   trunk group MLAG\n!\nvrf instance bluevrf\n!\ninterface Port-Channel1\n
    \  description MLAG_PEER_s1-brdr2_Po1\n   no shutdown\n   switchport\n   switchport
    mode trunk\n   switchport trunk group LEAF_PEER_L3\n   switchport trunk group
    MLAG\n!\ninterface Ethernet1\n   description MLAG_PEER_s1-brdr2_Ethernet1\n   no
    shutdown\n   channel-group 1 mode active\n!\ninterface Ethernet2\n   description
    P2P_LINK_TO_S1-SPINE1_Ethernet7\n   no shutdown\n   mtu 1500\n   no switchport\n
    \  ip address 172.30.255.25/31\n!\ninterface Ethernet3\n   description P2P_LINK_TO_S1-SPINE2_Ethernet7\n
    \  no shutdown\n   mtu 1500\n   no switchport\n   ip address 172.30.255.27/31\n!\ninterface
    Ethernet4\n   description P2P_LINK_TO_s1-core1_Ethernet2\n   no shutdown\n   mtu
    1500\n   no switchport\n   ip address 172.16.30.0/31\n!\ninterface Ethernet6\n
    \  description MLAG_PEER_s1-brdr2_Ethernet6\n   no shutdown\n   channel-group
    1 mode active\n!\ninterface Loopback0\n   description EVPN_Overlay_Peering\n   no
    shutdown\n   ip address 192.0.255.9/32\n!\ninterface Loopback1\n   description
    VTEP_VXLAN_Tunnel_Source\n   no shutdown\n   ip address 192.0.254.9/32\n!\ninterface
    Loopback100\n   description bluevrf_VTEP_DIAGNOSTICS\n   no shutdown\n   vrf bluevrf\n
    \  ip address 10.255.1.9/32\n!\ninterface Management0\n   description oob_management\n
    \  no shutdown\n   ip address 192.168.0.100/24\n!\ninterface Vlan110\n   description
    bluevrf_OP_Zone_1\n   no shutdown\n   vrf bluevrf\n   ip address virtual 10.1.10.1/24\n!\ninterface
    Vlan3009\n   description MLAG_PEER_L3_iBGP: vrf bluevrf\n   no shutdown\n   mtu
    1500\n   vrf bluevrf\n   ip address 10.255.251.12/31\n!\ninterface Vlan4093\n
    \  description MLAG_PEER_L3_PEERING\n   no shutdown\n   mtu 1500\n   ip address
    10.255.251.12/31\n!\ninterface Vlan4094\n   description MLAG_PEER\n   no shutdown\n
    \  mtu 1500\n   no autostate\n   ip address 10.255.252.12/31\n!\ninterface Vxlan1\n
    \  description s1-brdr1_VTEP\n   vxlan source-interface Loopback1\n   vxlan virtual-router
    encapsulation mac-address mlag-system-id\n   vxlan udp-port 4789\n   vxlan vlan
    110 vni 20110\n   vxlan vlan 160 vni 55160\n   vxlan vlan 360 vni 55360\n   vxlan
    vrf bluevrf vni 10\n!\nip virtual-router mac-address 00:1c:73:00:dc:01\n!\nip
    address virtual source-nat vrf bluevrf address 10.255.1.9\n!\nip routing\nip routing
    vrf bluevrf\n!\nip prefix-list PL-LOOPBACKS-EVPN-OVERLAY\n   seq 10 permit 192.0.255.0/24
    eq 32\n   seq 20 permit 192.0.254.0/24 eq 32\n!\nmlag configuration\n   domain-id
    DC1_BORDER_LEAFS\n   local-interface Vlan4094\n   peer-address 10.255.252.13\n
    \  peer-link Port-Channel1\n   reload-delay mlag 300\n   reload-delay non-mlag
    330\n!\nip route 0.0.0.0/0 192.168.0.1\n!\nroute-map RM-CONN-2-BGP permit 10\n
    \  match ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY\n!\nroute-map RM-MLAG-PEER-IN
    permit 10\n   description Make routes learned over MLAG Peer-link less preferred
    on spines to ensure optimal routing\n   set origin incomplete\n!\nrouter bfd\n
    \  multihop interval 1200 min-rx 1200 multiplier 3\n!\nrouter bgp 65103\n   router-id
    192.0.255.9\n   distance bgp 20 200 200\n   graceful-restart restart-time 300\n
    \  graceful-restart\n   maximum-paths 4 ecmp 4\n   no bgp default ipv4-unicast\n
    \  neighbor EVPN-OVERLAY-CORE peer group\n   neighbor EVPN-OVERLAY-CORE update-source
    Loopback0\n   neighbor EVPN-OVERLAY-CORE bfd\n   neighbor EVPN-OVERLAY-CORE ebgp-multihop
    15\n   neighbor EVPN-OVERLAY-CORE send-community\n   neighbor EVPN-OVERLAY-CORE
    maximum-routes 0\n   neighbor EVPN-OVERLAY-PEERS peer group\n   neighbor EVPN-OVERLAY-PEERS
    update-source Loopback0\n   neighbor EVPN-OVERLAY-PEERS bfd\n   neighbor EVPN-OVERLAY-PEERS
    ebgp-multihop 3\n   neighbor EVPN-OVERLAY-PEERS send-community\n   neighbor EVPN-OVERLAY-PEERS
    maximum-routes 0\n   neighbor IPv4-UNDERLAY-PEERS peer group\n   neighbor IPv4-UNDERLAY-PEERS
    send-community\n   neighbor IPv4-UNDERLAY-PEERS maximum-routes 12000\n   neighbor
    MLAG-IPv4-UNDERLAY-PEER peer group\n   neighbor MLAG-IPv4-UNDERLAY-PEER remote-as
    65103\n   neighbor MLAG-IPv4-UNDERLAY-PEER next-hop-self\n   neighbor MLAG-IPv4-UNDERLAY-PEER
    description s1-brdr2\n   neighbor MLAG-IPv4-UNDERLAY-PEER send-community\n   neighbor
    MLAG-IPv4-UNDERLAY-PEER maximum-routes 12000\n   neighbor MLAG-IPv4-UNDERLAY-PEER
    route-map RM-MLAG-PEER-IN in\n   neighbor 10.255.251.13 peer group MLAG-IPv4-UNDERLAY-PEER\n
    \  neighbor 10.255.251.13 description s1-brdr2\n   neighbor 172.16.30.1 peer group
    IPv4-UNDERLAY-PEERS\n   neighbor 172.16.30.1 remote-as 65300\n   neighbor 172.16.30.1
    description s1-core1\n   neighbor 172.30.255.24 peer group IPv4-UNDERLAY-PEERS\n
    \  neighbor 172.30.255.24 remote-as 65001\n   neighbor 172.30.255.24 description
    s1-spine1_Ethernet7\n   neighbor 172.30.255.26 peer group IPv4-UNDERLAY-PEERS\n
    \  neighbor 172.30.255.26 remote-as 65001\n   neighbor 172.30.255.26 description
    s1-spine2_Ethernet7\n   neighbor 192.0.255.1 peer group EVPN-OVERLAY-PEERS\n   neighbor
    192.0.255.1 remote-as 65001\n   neighbor 192.0.255.1 description s1-spine1\n   neighbor
    192.0.255.2 peer group EVPN-OVERLAY-PEERS\n   neighbor 192.0.255.2 remote-as 65001\n
    \  neighbor 192.0.255.2 description s1-spine2\n   neighbor 192.2.255.9 peer group
    EVPN-OVERLAY-CORE\n   neighbor 192.2.255.9 remote-as 65203\n   neighbor 192.2.255.9
    description s2-brdr1\n   neighbor 192.2.255.10 peer group EVPN-OVERLAY-CORE\n
    \  neighbor 192.2.255.10 remote-as 65203\n   neighbor 192.2.255.10 description
    s2-brdr2\n   redistribute connected route-map RM-CONN-2-BGP\n   !\n   vlan 110\n
    \     rd 192.0.255.9:20110\n      rd evpn domain remote 192.0.255.9:20110\n      route-target
    both 20110:20110\n      route-target import export evpn domain remote 20110:20110\n
    \     redistribute learned\n   !\n   vlan 160\n      rd 192.0.255.9:55160\n      rd
    evpn domain remote 192.0.255.9:55160\n      route-target both 55160:55160\n      route-target
    import export evpn domain remote 55160:55160\n      redistribute learned\n   !\n
    \  vlan 360\n      rd 192.0.255.9:55360\n      rd evpn domain remote 192.0.255.9:55360\n
    \     route-target both 55360:55360\n      route-target import export evpn domain
    remote 55360:55360\n      redistribute learned\n   !\n   address-family evpn\n
    \     neighbor EVPN-OVERLAY-CORE activate\n      neighbor EVPN-OVERLAY-CORE domain
    remote\n      neighbor EVPN-OVERLAY-PEERS activate\n      neighbor default next-hop-self
    received-evpn-routes route-type ip-prefix inter-domain\n   !\n   address-family
    rt-membership\n      neighbor EVPN-OVERLAY-CORE activate\n      neighbor EVPN-OVERLAY-PEERS
    activate\n   !\n   address-family ipv4\n      no neighbor EVPN-OVERLAY-CORE activate\n
    \     no neighbor EVPN-OVERLAY-PEERS activate\n      neighbor IPv4-UNDERLAY-PEERS
    activate\n      neighbor MLAG-IPv4-UNDERLAY-PEER activate\n   !\n   vrf bluevrf\n
    \     rd 192.0.255.9:10\n      route-target import evpn 10:10\n      route-target
    export evpn 10:10\n      router-id 192.0.255.9\n      neighbor 10.255.251.13 peer
    group MLAG-IPv4-UNDERLAY-PEER\n      redistribute connected\n!\nmanagement api
    http-commands\n   protocol https\n   no shutdown\n   !\n   vrf default\n      no
    shutdown\n!\nend\n"
