hostname: s2-leaf2
is_deployed: true
router_bgp:
  as: '65201'
  router_id: 192.2.255.54
  distance:
    external_routes: 20
    internal_routes: 200
    local_routes: 200
  bgp:
    default:
      ipv4_unicast: false
  maximum_paths:
    paths: 4
    ecmp: 4
  graceful_restart:
    enabled: true
    restart_time: 300
  peer_groups:
  - name: MLAG-IPv4-UNDERLAY-PEER
    type: ipv4
    remote_as: '65201'
    next_hop_self: true
    description: s2-leaf1
    maximum_routes: 12000
    send_community: all
    route_map_in: RM-MLAG-PEER-IN
  - name: IPv4-UNDERLAY-PEERS
    type: ipv4
    maximum_routes: 12000
    send_community: all
  - name: EVPN-OVERLAY-PEERS
    type: evpn
    update_source: Loopback0
    bfd: true
    send_community: all
    maximum_routes: 0
    ebgp_multihop: 3
  address_family_ipv4:
    peer_groups:
    - name: MLAG-IPv4-UNDERLAY-PEER
      activate: true
    - name: IPv4-UNDERLAY-PEERS
      activate: true
    - name: EVPN-OVERLAY-PEERS
      activate: false
  neighbors:
  - ip_address: 10.222.251.100
    peer_group: MLAG-IPv4-UNDERLAY-PEER
    peer: s2-leaf1
    description: s2-leaf1
  - ip_address: 172.32.255.204
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65002'
    peer: s2-spine1
    description: s2-spine1_Ethernet3
  - ip_address: 172.32.255.206
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65002'
    peer: s2-spine2
    description: s2-spine2_Ethernet3
  - ip_address: 192.2.255.1
    peer_group: EVPN-OVERLAY-PEERS
    peer: s2-spine1
    description: s2-spine1
    remote_as: '65002'
  - ip_address: 192.2.255.2
    peer_group: EVPN-OVERLAY-PEERS
    peer: s2-spine2
    description: s2-spine2
    remote_as: '65002'
  redistribute_routes:
  - source_protocol: connected
    route_map: RM-CONN-2-BGP
  address_family_evpn:
    peer_groups:
    - name: EVPN-OVERLAY-PEERS
      activate: true
  vrfs:
  - name: bluevrf
    router_id: 192.2.255.54
    rd: 192.2.255.54:10
    route_targets:
      import:
      - address_family: evpn
        route_targets:
        - '10:10'
      export:
      - address_family: evpn
        route_targets:
        - '10:10'
    redistribute_routes:
    - source_protocol: connected
    neighbors:
    - ip_address: 10.222.251.100
      peer_group: MLAG-IPv4-UNDERLAY-PEER
  vlans:
  - id: 110
    tenant: Tenant_A
    rd: 192.2.255.54:20110
    route_targets:
      both:
      - 20110:20110
    redistribute_routes:
    - learned
  - id: 360
    tenant: Tenant_A
    rd: 192.2.255.54:55360
    route_targets:
      both:
      - 55360:55360
    redistribute_routes:
    - learned
  - id: 160
    tenant: Tenant_A
    rd: 192.2.255.54:55160
    route_targets:
      both:
      - 55160:55160
    redistribute_routes:
    - learned
static_routes:
- vrf: default
  destination_address_prefix: 0.0.0.0/0
  gateway: 192.168.0.1
service_routing_protocols_model: multi-agent
ip_routing: true
vlan_internal_order:
  allocation: ascending
  range:
    beginning: 1006
    ending: 1199
ip_name_servers:
- ip_address: 192.168.2.1
  vrf: default
- ip_address: 8.8.8.8
  vrf: default
- ip_address: 168.95.1.1
  vrf: default
spanning_tree:
  mode: mstp
  mst_instances:
  - id: '0'
    priority: 16384
  no_spanning_tree_vlan: 4093-4094
vrfs:
- name: default
  ip_routing: false
- name: bluevrf
  tenant: Tenant_A
  ip_routing: true
management_interfaces:
- name: Management0
  description: oob_management
  shutdown: false
  vrf: default
  ip_address: 192.168.0.123/24
  gateway: 192.168.0.1
  type: oob
management_api_http:
  enable_vrfs:
  - name: default
  enable_https: true
vlans:
- id: 4093
  tenant: system
  name: LEAF_PEER_L3
  trunk_groups:
  - LEAF_PEER_L3
- id: 4094
  tenant: system
  name: MLAG_PEER
  trunk_groups:
  - MLAG
- id: 110
  name: bluevrf_OP_Zone_1
  tenant: Tenant_A
- id: 3009
  name: MLAG_iBGP_bluevrf
  trunk_groups:
  - LEAF_PEER_L3
  tenant: Tenant_A
- id: 160
  name: bluevrf_VMOTION
  tenant: Tenant_A
- id: 360
  name: bluevrf_V360
  tenant: Tenant_A
vlan_interfaces:
- name: Vlan4093
  description: MLAG_PEER_L3_PEERING
  shutdown: false
  mtu: 1500
  ip_address: 10.222.251.101/31
- name: Vlan4094
  description: MLAG_PEER
  shutdown: false
  no_autostate: true
  mtu: 1500
  ip_address: 10.222.252.101/31
- name: Vlan110
  tenant: Tenant_A
  tags:
  - opzone
  description: bluevrf_OP_Zone_1
  shutdown: false
  ip_address_virtual: 10.1.10.1/24
  vrf: bluevrf
- name: Vlan3009
  tenant: Tenant_A
  type: underlay_peering
  shutdown: false
  description: 'MLAG_PEER_L3_iBGP: vrf bluevrf'
  vrf: bluevrf
  mtu: 1500
  ip_address: 10.222.251.101/31
port_channel_interfaces:
- name: Port-Channel1
  description: MLAG_PEER_s2-leaf1_Po1
  type: switched
  shutdown: false
  mode: trunk
  trunk_groups:
  - LEAF_PEER_L3
  - MLAG
ethernet_interfaces:
- name: Ethernet1
  peer: s2-leaf1
  peer_interface: Ethernet1
  peer_type: mlag_peer
  description: MLAG_PEER_s2-leaf1_Ethernet1
  type: port-channel-member
  shutdown: false
  channel_group:
    id: 1
    mode: active
- name: Ethernet6
  peer: s2-leaf1
  peer_interface: Ethernet6
  peer_type: mlag_peer
  description: MLAG_PEER_s2-leaf1_Ethernet6
  type: port-channel-member
  shutdown: false
  channel_group:
    id: 1
    mode: active
- name: Ethernet2
  peer: s2-spine1
  peer_interface: Ethernet3
  peer_type: spine
  description: P2P_LINK_TO_S2-SPINE1_Ethernet3
  shutdown: false
  mtu: 1500
  type: routed
  ip_address: 172.32.255.205/31
- name: Ethernet3
  peer: s2-spine2
  peer_interface: Ethernet3
  peer_type: spine
  description: P2P_LINK_TO_S2-SPINE2_Ethernet3
  shutdown: false
  mtu: 1500
  type: routed
  ip_address: 172.32.255.207/31
mlag_configuration:
  domain_id: pod21
  local_interface: Vlan4094
  peer_address: 10.222.252.100
  peer_link: Port-Channel1
  reload_delay_mlag: '300'
  reload_delay_non_mlag: '330'
route_maps:
- name: RM-MLAG-PEER-IN
  sequence_numbers:
  - sequence: 10
    type: permit
    set:
    - origin incomplete
    description: Make routes learned over MLAG Peer-link less preferred on spines to ensure optimal routing
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
loopback_interfaces:
- name: Loopback0
  description: EVPN_Overlay_Peering
  shutdown: false
  ip_address: 192.2.255.54/32
- name: Loopback1
  description: VTEP_VXLAN_Tunnel_Source
  shutdown: false
  ip_address: 192.2.254.53/32
- name: Loopback100
  description: bluevrf_VTEP_DIAGNOSTICS
  shutdown: false
  vrf: bluevrf
  ip_address: 10.255.1.54/32
prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 192.2.255.0/24 eq 32
  - sequence: 20
    action: permit 192.2.254.0/24 eq 32
router_bfd:
  multihop:
    interval: 1200
    min_rx: 1200
    multiplier: 3
ip_igmp_snooping:
  globally_enabled: true
ip_virtual_router_mac_address: 00:1c:73:00:dc:01
vxlan_interface:
  Vxlan1:
    description: s2-leaf2_VTEP
    vxlan:
      udp_port: 4789
      source_interface: Loopback1
      virtual_router_encapsulation_mac_address: mlag-system-id
      vlans:
      - id: 110
        vni: 20110
      - id: 160
        vni: 55160
      - id: 360
        vni: 55360
      vrfs:
      - name: bluevrf
        vni: 10
virtual_source_nat_vrfs:
- name: bluevrf
  ip_address: 10.255.1.54
metadata:
  platform: cEOS
